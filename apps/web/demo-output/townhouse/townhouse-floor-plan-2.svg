    <text x="24" y="696" font-size="9" fill="#b45309">⚠ Phân bổ phòng theo tầng dùng heuristic mặc định (Requirement không có chi tiết phòng theo từng tầng): tầng</text><text x="24" y="708" font-size="9" fill="#b45309">trệt = phòng khách/bếp/1 WC, các tầng còn lại chia đều phòng ngủ/WC còn lại.</text><text x="24" y="720" font-size="9" fill="#b45309">⚠ Yêu cầu có ban công (balcony) — Stage 2A chưa đặt hình học ban công (ngoài phạm vi task hiện tại), chỉ ghi</text><text x="24" y="732" font-size="9" fill="#b45309">nhận yêu cầu.</text><text x="24" y="744" font-size="9" fill="#b45309">⚠ Chưa hỗ trợ đặt vị trí cho phòng tự do: phòng thờ ông bà — chưa xuất hiện trong bản vẽ.</text><text x="24" y="756" font-size="9" fill="#b45309">⚠ Ghi nhận loại trừ (chưa cần xử lý hình học): phòng đọc sách.</text>
    <text x="24" y="772" font-size="8" fill="#b91c1c">Bản vẽ khái niệm sơ bộ — dựa trên thông tin và giả định đã cung cấp, cần kiến trúc sư/kỹ sư kiểm tra lại, KHÔNG dùng để thi</text><text x="24" y="783" font-size="8" fill="#b91c1c">công trực tiếp.</text>
