    <text x="24" y="672" font-size="9" fill="#b45309">CẢNH BÁO: Phân bổ phòng theo tầng dùng heuristic mặc định (Requirement không có chi tiết phòng theo từng</text><text x="24" y="684" font-size="9" fill="#b45309">tầng): tầng trệt = phòng khách/bếp/1 WC, các tầng còn lại chia đều phòng ngủ/WC còn lại, phòng thờ/ban công</text><text x="24" y="696" font-size="9" fill="#b45309">(nếu có) đặt ở tầng trên cùng.</text><text x="24" y="708" font-size="9" fill="#b45309">CẢNH BÁO: Ghi nhận loại trừ (chưa cần xử lý hình học): phòng đọc sách.</text><text x="24" y="720" font-size="9" fill="#b45309">CẢNH BÁO: [Tầng 1] Phòng "wc-2" (wc) tỷ lệ khung hình 2.50:1 — ngoài khoảng ưu tiên (tối đa 1.8:1), vẫn trong</text><text x="24" y="732" font-size="9" fill="#b45309">giới hạn chấp nhận được.</text><text x="24" y="744" font-size="9" fill="#b45309">CẢNH BÁO: [Tầng 1] Phòng "wc-2" (wc) diện tích 6.40m² — ngoài khoảng ưu tiên (tối đa 6m²), vẫn trong giới hạn</text><text x="24" y="756" font-size="9" fill="#b45309">chấp nhận được.</text>
    <text x="24" y="772" font-size="8" fill="#b91c1c">Bản vẽ khái niệm sơ bộ — dựa trên thông tin và giả định đã cung cấp, cần kiến trúc sư/kỹ sư kiểm tra lại, KHÔNG dùng để thi</text><text x="24" y="783" font-size="8" fill="#b91c1c">công trực tiếp.</text>
